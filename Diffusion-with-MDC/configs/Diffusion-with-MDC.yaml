model:
  target: models.unet.UNetModelSwin
  ckpt_path: ~
  params:
    image_size: 64
    # image_size: 32
    in_channels: 3
    model_channels: 160
    out_channels: 3
    attention_resolutions: [64,32,16,8]
    # attention_resolutions: [32,16,8,4]
    dropout: 0
    channel_mult: [1, 2, 2, 4]
    num_res_blocks: [2, 2, 2, 2]
    conv_resample: True
    dims: 2
    use_fp16: False
    num_head_channels: 32
    use_scale_shift_norm: True
    resblock_updown: False
    swin_depth: 2
    swin_embed_dim: 192
    window_size: 8
    mlp_ratio: 4
    cond_lq: True
    lq_size: 128

diffusion:
  target: models.script_util.create_gaussian_diffusion
  params:
    sf: 4
    schedule_name: exponential
    schedule_kwargs:
      power: 0.3
    etas_end: 0.99
    steps: 15
    min_noise_level: 0.04
    kappa: 2.0
    weighted_mse: False
    predict_type: xstart
    timestep_respacing: ~
    scale_factor: 1.0
    normalize_input: True
    latent_flag: True
    low_high_frequency_weight: 1.0
    qr_structure_detail_weight: 1.0
autoencoder:
  target: ldm.models.autoencoder.VQModelTorch
  ckpt_path: weights/autoencoder/autoencoder_vq_f4.pth
  use_fp16: True
  params:
    embed_dim: 3
    n_embed: 8192
    ddconfig:
      double_z: False
      z_channels: 3
      resolution: 256
      in_channels: 3
      out_ch: 3
      ch: 128
      ch_mult:
      - 1
      - 2
      - 4
      num_res_blocks: 2
      attn_resolutions: []
      dropout: 0.0
      padding_mode: zeros

degradation:
  sf: 4
  # the first degradation process
  resize_prob: [0.444, 0.444, 0.111]  # up, down, keep
  resize_range_down: [0.25, 0.5, 0.75, 1.0] # 4 evenly spaced downsampling factors
  resize_range_up: [1.0, 1.5, 2.0, 2.5] # 4 evenly spaced upsampling factors
  resize_mode_down: 'nearest' # nearest neighbor interpolation for downsampling
  resize_mode_up: 'bicubic' # bicubic interpolation for upsampling
  gaussian_noise_prob: 0.5
  noise_range: [1, 30]
  poisson_scale_range: [0.05, 3.0]
  gray_noise_prob: 0.4
  jpeg_range: [30, 95]

  # the second degradation process
  second_order_prob: 0.5
  second_blur_prob: 0.8
  resize_prob2: [0.444, 0.444, 0.111]  # up, down, keep
  resize_range2_down: [0.25, 0.5, 0.75, 1.0]
  resize_range2_up: [1.0, 1.5, 2.0, 2.5]
  resize_mode2_down: 'nearest' # nearest neighbor interpolation for downsampling
  resize_mode2_up: 'bicubic' # bicubic interpolation for upsampling
  gaussian_noise_prob2: 0.5
  noise_range2: [1, 25]
  poisson_scale_range2: [0.05, 2.5]
  gray_noise_prob2: 0.4
  jpeg_range2: [30, 95]

  gt_size: 256 
  resize_back: False
  use_sharp: False

data:
  train:
    type: realesrgan
    params:
      # NOTE: Please modify the following paths to your actual training data paths
      txt_file_path: [
                      './traindata/train_path_1.txt',  # Modify to your training data path
                      './traindata/train_path_2.txt',  # Modify to your training data path
                     ] 
      im_exts: ['png', 'png']
      # im_exts: png
      io_backend:
        type: disk
      blur_kernel_size: 21
      kernel_list: ['iso', 'aniso', 'generalized_iso', 'generalized_aniso', 'plateau_iso', 'plateau_aniso']
      kernel_prob: [0.45, 0.25, 0.12, 0.03, 0.12, 0.03]
      sinc_prob: 0.1
      blur_sigma: [0.2, 3.0]
      betag_range: [0.5, 4.0]
      betap_range: [1, 2.0]

      blur_kernel_size2: 15
      kernel_list2: ['iso', 'aniso', 'generalized_iso', 'generalized_aniso', 'plateau_iso', 'plateau_aniso']
      kernel_prob2: [0.45, 0.25, 0.12, 0.03, 0.12, 0.03]
      sinc_prob2: 0.1
      blur_sigma2: [0.2, 1.5]
      betag_range2: [0.5, 4.0]
      betap_range2: [1, 2.0]

      final_sinc_prob: 0.8

      gt_size: 256
      crop_pad_size: 300
      use_hflip: True
      use_rot: False
      rescale_gt: True
  val:
    type: folder
    params:
      # NOTE: Please modify the following path to your actual validation data path
      dir_path: ./testdata  # Modify to your validation data path
      dir_path_extra: ~
      transform_type: default
      transform_kwargs:
          mean: 0.5
          std: 0.5
      im_exts: png
      length: ~
      recursive: False

train:
  lr: 5e-5
  # batch: [64, 8]   # batchsize for training and validation
  batch: [8, 4]   # batchsize for training and validation
  use_fp16: False
  microbatch: 16
  seed: 123456
  global_seeding: True
  prefetch_factor: 2
  num_workers: 4
  ema_rate: 0.999
  iterations: 500000
  # iterations: 50000
  # milestones: [5000, 500000]
  milestones: [10000, 500000]  # Save model every 10000 iterations, finish at 500000 iterations
  # milestones: [5000, 150000]
  weight_decay: 0
  # save_freq: 10000
  save_freq: 20000 # Save model every 20000 iterations
  val_freq: 10000
  # val_freq: 1000
  log_freq: [1000, 5000, 1] #[training loss, training images, val images]
  save_images: True  # save the images of tensorboard logging
  use_ema_val: True
